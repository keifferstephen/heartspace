<!DOCTYPE html>
<html>
<head>

    <link rel="icon" type="image/png" href="favicon.png">

    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
content="HeartSpace is a safe anonymous community where people can share feelings, seek advice, heal, and support one another.">

<meta name="keywords"
content="anonymous confessions, support community, heartbreak, advice, mental wellness, healing">

<meta name="author" content="HeartSpace">

<meta property="og:title" content="HeartSpace">
<meta property="og:description"
content="A safe place to ask, rant, heal, and be heard.">
<meta property="og:type" content="website">
<meta property="og:url"
content="https://azuree.github.io/heartspace/">

    <title>HeartSpace - A Place to Let It Out</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>💔 HeartSpace</h1>
    <p>A safe place to ask, rant, heal, and be heard.</p>
</header>

<section class="about">
    <h2>About HeartSpace</h2>

    <p>
    HeartSpace is an anonymous online community where
    people can share thoughts, heartbreaks, struggles,
    healing journeys, and receive support from others.
    </p>
</section>

<section class="post-box">

    <input id="name" placeholder="Your name (optional)">

    <select id="mood">
        <option>💔 Heartbroken</option>
        <option>😔 Sad</option>
        <option>😡 Angry</option>
        <option>🫂 Need Advice</option>
        <option>🌱 Healing</option>
    </select>

    <textarea id="message" placeholder="Write what's on your heart..."></textarea>

    <button onclick="addPost()">Post</button>

</section>



<h2>Community Rants</h2>

<div id="posts"></div>



<script src="script.js"></script>

</body>
</html>
